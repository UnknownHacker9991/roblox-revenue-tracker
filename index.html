<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Revenue Estimator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e17;
    --bg2: #111827;
    --bg3: #1a2235;
    --green: #00ff88;
    --cyan: #00e5ff;
    --magenta: #ff00e5;
    --text: #c9d1d9;
    --dim: #6b7280;
    --border: #1e293b;
    --row-hover: rgba(0, 229, 255, 0.06);
  }

  body {
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
    position: relative;
  }

  .header h1 {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    background: linear-gradient(90deg, var(--green), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .header .subtitle {
    color: var(--dim);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  .header .blink {
    display: inline-block;
    animation: blink 1s step-end infinite;
    color: var(--green);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 24px;
    text-align: center;
    min-width: 180px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--green), var(--cyan));
  }

  .stat-card .label {
    font-size: 0.7rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--green);
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    margin-bottom: 30px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }

  thead th {
    background: var(--bg3);
    color: var(--cyan);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 14px 12px;
    text-align: right;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    border-bottom: 2px solid var(--border);
    position: relative;
    transition: color 0.2s;
  }

  thead th:first-child { text-align: center; width: 40px; }
  thead th:nth-child(2) { text-align: left; }

  thead th:hover { color: var(--green); }
  thead th .sort-arrow { margin-left: 4px; font-size: 0.65rem; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--row-hover); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 12px;
    font-size: 0.82rem;
    text-align: right;
    white-space: nowrap;
  }

  td:first-child {
    text-align: center;
    color: var(--dim);
    font-size: 0.75rem;
  }

  td:nth-child(2) {
    text-align: left;
    font-weight: 600;
    color: #fff;
  }

  td.money { color: var(--green); }
  td.money.alltime { color: var(--cyan); }

  /* Bar chart */
  .chart-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 30px;
  }

  .chart-section h2 {
    font-size: 0.85rem;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bar-label {
    width: 180px;
    min-width: 120px;
    font-size: 0.75rem;
    text-align: right;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .bar-track {
    flex: 1;
    height: 22px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--green), var(--cyan));
    transition: width 0.6s ease;
    position: relative;
  }

  .bar-value {
    width: 90px;
    font-size: 0.75rem;
    color: var(--green);
    font-weight: 600;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 20px;
    border-top: 1px solid var(--border);
    color: var(--dim);
    font-size: 0.7rem;
    line-height: 1.8;
  }

  .footer a {
    color: var(--cyan);
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }

  .last-updated {
    text-align: center;
    color: var(--dim);
    font-size: 0.72rem;
    margin-bottom: 20px;
  }

  .last-updated span { color: var(--green); }

  .error-msg {
    text-align: center;
    padding: 60px 20px;
    color: #ff6b6b;
    font-size: 0.9rem;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--green);
    font-size: 0.9rem;
  }

  .loading::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  /* Mobile */
  @media (max-width: 768px) {
    .container { padding: 10px; }
    .header { padding: 20px 10px; }
    .stat-card { min-width: 140px; padding: 12px 16px; }
    .stat-card .value { font-size: 1.1rem; }
    .bar-label { width: 100px; min-width: 80px; font-size: 0.65rem; }
    .bar-value { width: 70px; font-size: 0.65rem; }
    .chart-section { padding: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Roblox Revenue Estimator</h1>
    <div class="subtitle">// live player data &times; roblox ARPDAU <span class="blink">_</span></div>
  </div>

  <div id="app">
    <div class="loading" id="loading">Initializing</div>
  </div>
</div>

<script>
(function() {
  const DATA_URL = 'data/revenue_stats.json';

  // ─── Format helpers ─────────────────────────────────────────────
  function fmtUSD(n) {
    if (n == null || isNaN(n)) return '$0';
    const abs = Math.abs(n);
    if (abs >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
    return '$' + n.toFixed(2);
  }

  function fmtNum(n) {
    return n != null ? n.toLocaleString() : '0';
  }

  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString();
    } catch { return iso; }
  }

  // ─── Sorting state ─────────────────────────────────────────────
  let sortCol = 'est_daily';
  let sortAsc = false;

  const COLUMNS = [
    { key: 'rank',        label: '#',           align: 'center', format: null },
    { key: 'name',        label: 'Game',        align: 'left',   format: null },
    { key: 'playing',     label: 'Players Now', align: 'right',  format: fmtNum },
    { key: 'est_daily',   label: 'Est. Daily',  align: 'right',  format: fmtUSD, cls: 'money' },
    { key: 'est_weekly',  label: 'Est. Weekly', align: 'right',  format: fmtUSD, cls: 'money' },
    { key: 'est_monthly', label: 'Est. Monthly',align: 'right',  format: fmtUSD, cls: 'money' },
    { key: 'est_yearly',  label: 'Est. Yearly', align: 'right',  format: fmtUSD, cls: 'money' },
    { key: 'est_alltime', label: 'Est. All-Time',align:'right',  format: fmtUSD, cls: 'money alltime' },
  ];

  // ─── Render ─────────────────────────────────────────────────────
  function render(data) {
    const app = document.getElementById('app');

    if (!data || !data.games || data.games.length === 0) {
      app.innerHTML = '<div class="error-msg">[!] No data found. Run scraper.py first to generate data.</div>';
      return;
    }

    // Sort games
    let games = [...data.games];
    if (sortCol && sortCol !== 'rank') {
      games.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
      });
    }

    const totalPlayers = games.reduce((s, g) => s + (g.playing || 0), 0);
    const totalDaily = games.reduce((s, g) => s + (g.est_daily || 0), 0);

    let html = '';

    // Stats bar
    const devPayoutAnnual = data.dev_payout_annual || 1500000000;
    const platformDAU = data.platform_dau || 144000000;

    html += '<div class="stats-bar">';
    html += `<div class="stat-card"><div class="label">Games Tracked</div><div class="value">${games.length}</div></div>`;
    html += `<div class="stat-card"><div class="label">Concurrent Players</div><div class="value">${fmtNum(totalPlayers)}</div></div>`;
    html += `<div class="stat-card"><div class="label">Est. Daily (tracked)</div><div class="value">${fmtUSD(totalDaily)}</div></div>`;
    html += `<div class="stat-card"><div class="label">Dev Payouts / Yr</div><div class="value">${fmtUSD(devPayoutAnnual)}</div></div>`;
    html += `<div class="stat-card"><div class="label">Platform DAU</div><div class="value">${(platformDAU / 1e6).toFixed(0)}M</div></div>`;
    html += '</div>';

    // Last updated
    html += `<div class="last-updated">Last updated: <span>${fmtTime(data.last_updated)}</span></div>`;

    // Table
    html += '<div class="table-wrap"><table><thead><tr>';
    for (const col of COLUMNS) {
      const arrow = sortCol === col.key ? (sortAsc ? ' &#9650;' : ' &#9660;') : '';
      html += `<th data-col="${col.key}">${col.label}<span class="sort-arrow">${arrow}</span></th>`;
    }
    html += '</tr></thead><tbody>';

    games.forEach((g, i) => {
      html += '<tr>';
      for (const col of COLUMNS) {
        const cls = col.cls ? ` class="${col.cls}"` : '';
        let val;
        if (col.key === 'rank') val = i + 1;
        else if (col.format) val = col.format(g[col.key]);
        else val = g[col.key];
        html += `<td${cls}>${val}</td>`;
      }
      html += '</tr>';
    });

    html += '</tbody></table></div>';

    // Bar chart
    const maxDaily = Math.max(...games.map(g => g.est_daily || 0), 1);
    html += '<div class="chart-section"><h2>Daily Revenue Comparison</h2><div class="bar-chart">';
    for (const g of games) {
      const pct = ((g.est_daily || 0) / maxDaily * 100).toFixed(1);
      html += `<div class="bar-row">
        <div class="bar-label">${g.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-value">${fmtUSD(g.est_daily)}</div>
      </div>`;
    }
    html += '</div></div>';

    // Footer
    html += `<div class="footer">
      Revenue figures are estimates based on public player count data and Roblox's published ARPDAU. Actual earnings may vary.<br>
      Built by <a href="https://github.com/UnknownHacker9991" target="_blank" rel="noopener">UnknownHacker9991</a>
    </div>`;

    app.innerHTML = html;

    // Attach sort listeners
    document.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (col === sortCol) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = false; }
        render(data);
      });
    });
  }

  // ─── Load data ──────────────────────────────────────────────────
  fetch(DATA_URL)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => render(data))
    .catch(() => {
      document.getElementById('app').innerHTML =
        '<div class="error-msg">[!] Could not load data/revenue_stats.json<br>Run <code>python scraper.py</code> first to generate data.</div>';
    });
})();
</script>
</body>
</html>
